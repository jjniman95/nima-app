name: nima_app
description: NIMA - Nearby Instant Meet App. Meet safely, connect silently.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── UI ───────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # ─── Firebase ─────────────────────────────────────────────
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.5

  # ─── State Management ─────────────────────────────────────
  # Riverpod: reactive, compile-safe, no BuildContext needed in logic
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1       # @riverpod code-gen annotations

  # ─── Navigation ───────────────────────────────────────────
  # GoRouter: auth-aware declarative routing with redirects
  go_router: ^14.6.2

  # ─── Local Storage ────────────────────────────────────────
  # For persisting user session state (e.g. onboarding seen flag)
  shared_preferences: ^2.3.3

  # ─── Utils ────────────────────────────────────────────────
  # International phone number field with country code picker
  intl_phone_field: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ─── Code Generation ──────────────────────────────────────
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1        # generates providers from @riverpod
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1             # lint rules for Riverpod best practices

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
