workflows:
  android-debug:
    name: NIMA Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Prepare Flutter project
        script: |
          if [ ! -d "android" ]; then
            flutter create .
          fi
          flutter pub get
      - name: Build debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
